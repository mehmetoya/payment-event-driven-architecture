version: '3.9'

networks:
  payment-network:
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data:

services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - payment-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI → http://localhost:15672
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - payment-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Application Services ─────────────────────────────────────────────────

  payment-service:
    build:
      context: .
      dockerfile: src/PaymentEDA.PaymentService/Dockerfile
    container_name: payment-service
    ports:
      - "5001:8080"
    environment:
      - ConnectionStrings__PaymentDb=Host=postgres;Port=5432;Database=payment_db;Username=postgres;Password=postgres
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - payment-network

  fraud-service:
    build:
      context: .
      dockerfile: src/PaymentEDA.FraudService/Dockerfile
    container_name: fraud-service
    ports:
      - "5002:8080"
    environment:
      - ConnectionStrings__FraudDb=Host=postgres;Port=5432;Database=fraud_db;Username=postgres;Password=postgres
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - payment-network

  notification-service:
    build:
      context: .
      dockerfile: src/PaymentEDA.NotificationService/Dockerfile
    container_name: notification-service
    ports:
      - "5003:8080"
    environment:
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - payment-network

  ledger-service:
    build:
      context: .
      dockerfile: src/PaymentEDA.LedgerService/Dockerfile
    container_name: ledger-service
    ports:
      - "5004:8080"
    environment:
      - ConnectionStrings__LedgerDb=Host=postgres;Port=5432;Database=ledger_db;Username=postgres;Password=postgres
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - payment-network

  reconciliation-service:
    build:
      context: .
      dockerfile: src/PaymentEDA.ReconciliationService/Dockerfile
    container_name: reconciliation-service
    ports:
      - "5005:8080"
    environment:
      - ConnectionStrings__ReconciliationDb=Host=postgres;Port=5432;Database=reconciliation_db;Username=postgres;Password=postgres
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - payment-network

  analytics-service:
    build:
      context: .
      dockerfile: src/PaymentEDA.AnalyticsService/Dockerfile
    container_name: analytics-service
    ports:
      - "5006:8080"
    environment:
      - ConnectionStrings__AnalyticsDb=Host=postgres;Port=5432;Database=analytics_db;Username=postgres;Password=postgres
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - payment-network

  saga-service:
    build:
      context: .
      dockerfile: src/PaymentEDA.Saga/Dockerfile
    container_name: saga-service
    ports:
      - "5007:8080"
    environment:
      - ConnectionStrings__SagaDb=Host=postgres;Port=5432;Database=saga_db;Username=postgres;Password=postgres
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - payment-network
